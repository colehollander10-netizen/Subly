name: Subly
options:
  bundleIdPrefix: com.colehollander
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.colehollander.subly
    INFOPLIST_KEY_CFBundleDisplayName: Finn
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
packages:
  TrialParsingCore:
    path: Packages/TrialParsingCore
  SubscriptionStore:
    path: Packages/SubscriptionStore
  TrialEngine:
    path: Packages/TrialEngine
  NotificationEngine:
    path: Packages/NotificationEngine
  LogoService:
    path: Packages/LogoService
  MascotKit:
    path: Packages/MascotKit
  PhosphorSwift:
    url: https://github.com/phosphor-icons/swift
    branch: main
schemes:
  Subly:
    build:
      targets:
        Subly: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Subly:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Subly
    dependencies:
      - package: TrialParsingCore
      - package: SubscriptionStore
      - package: TrialEngine
      - package: NotificationEngine
      - package: LogoService
      - package: MascotKit
      - package: PhosphorSwift
    info:
      path: Subly/Info.plist
