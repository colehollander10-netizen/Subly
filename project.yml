name: Subly
options:
  bundleIdPrefix: com.subly
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.subly.Subly
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
packages:
  EmailEngine:
    path: Packages/EmailEngine
  SubscriptionStore:
    path: Packages/SubscriptionStore
  TrialEngine:
    path: Packages/TrialEngine
  NotificationEngine:
    path: Packages/NotificationEngine
  LogoService:
    path: Packages/LogoService
schemes:
  Subly:
    build:
      targets:
        Subly: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Subly:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Subly
    resources:
      - path: Subly/GoogleService-Info.plist
    dependencies:
      - package: EmailEngine
      - package: SubscriptionStore
      - package: TrialEngine
      - package: NotificationEngine
      - package: LogoService
    info:
      path: Subly/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.332703006085-tb86ofvs1h5mjiftsp182h779b813tll
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.subly.scan.refresh
